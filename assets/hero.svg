<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">alon-skills — six Claude Code skills, one install</title>
<desc id="d">A tech HUD banner for the alon-skills plugin: the wordmark alon-skills in a cyan-to-magenta gradient over a dark grid, framed by corner brackets, listing six slash commands. Tagline: model-first, failure-path-aware, YAGNI.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
    <stop stop-color="#0A0E18"/><stop offset=".5" stop-color="#070A12"/><stop offset="1" stop-color="#0B0814"/>
  </linearGradient>
  <linearGradient id="wm" x1="219" y1="0" x2="681" y2="0" gradientUnits="userSpaceOnUse">
    <stop stop-color="#5EEAD4"/><stop offset=".34" stop-color="#38BDF8"/><stop offset=".64" stop-color="#818CF8"/><stop offset="1" stop-color="#E879F9"/>
  </linearGradient>
  <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
    <stop stop-color="#22D3EE" stop-opacity="0"/><stop offset=".2" stop-color="#22D3EE"/><stop offset=".5" stop-color="#818CF8"/><stop offset=".8" stop-color="#E879F9"/><stop offset="1" stop-color="#E879F9" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
    <stop stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".55"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="gCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 70) scale(360 220)">
    <stop stop-color="#22D3EE" stop-opacity=".30"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gMag" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(770 250) scale(360 220)">
    <stop stop-color="#E879F9" stop-opacity=".24"/><stop offset="1" stop-color="#E879F9" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M30 0H0V30" fill="none" stroke="#2A3650" stroke-width=".7" stroke-opacity=".45"/>
  </pattern>
  <filter id="glow" x="-30%" y="-80%" width="160%" height="260%">
    <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="nameClip"><text x="450" y="158" text-anchor="middle" class="wmark">alon-skills</text></clipPath>
  <clipPath id="screen"><rect x="18" y="18" width="864" height="264" rx="16"/></clipPath>
  <clipPath id="ul"><rect x="320" y="176" width="260" height="6" rx="3"/></clipPath>
  <style><![CDATA[
    .mono{font-family:ui-monospace,'Cascadia Code','Segoe UI Mono',Consolas,'Courier New',monospace}
    .wmark{font-family:'Segoe UI',system-ui,-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif;font-weight:800;font-size:82px;letter-spacing:1px}
    .sheen{animation:sweep 5.5s ease-in-out infinite}
    .cur{animation:blink 1.1s steps(1) infinite}
    .liveDot{animation:pulse 1.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .liveRing{animation:ring 1.8s ease-out infinite;transform-box:fill-box;transform-origin:center}
    .scan{animation:scan 7s linear infinite}
    .ulSheen{animation:uls 4.5s ease-in-out infinite}
    @keyframes sweep{0%{transform:translateX(-300px)}55%,100%{transform:translateX(760px)}}
    @keyframes uls{0%{transform:translateX(-80px)}60%,100%{transform:translateX(260px)}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    @keyframes ring{0%{opacity:.5;transform:scale(.7)}75%,100%{opacity:0;transform:scale(2.8)}}
    @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(248px)}}
    @media (prefers-reduced-motion:reduce){.sheen,.cur,.liveDot,.liveRing,.scan,.ulSheen{animation:none}.liveRing{opacity:0}}
  ]]></style>
</defs>

<rect width="900" height="300" fill="url(#bg)"/>
<g clip-path="url(#screen)">
  <rect width="900" height="300" fill="url(#grid)"/>
  <rect width="900" height="300" fill="url(#gCyan)"/>
  <rect width="900" height="300" fill="url(#gMag)"/>
  <rect class="scan" x="18" y="18" width="864" height="40" fill="#22D3EE" opacity=".05"/>
</g>

<rect x="18" y="18" width="864" height="264" rx="16" fill="none" stroke="#1E2A42" stroke-opacity=".9"/>
<g stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round">
  <path d="M30 64V36a6 6 0 0 1 6-6h28"/>
  <path d="M836 30h28a6 6 0 0 1 6 6v28"/>
  <path d="M870 236v28a6 6 0 0 1-6 6h-28"/>
  <path d="M64 270H36a6 6 0 0 1-6-6v-28"/>
</g>

<!-- top status bar -->
<g class="mono" font-size="11.5" letter-spacing="1.5">
  <circle class="liveRing" cx="50" cy="49" r="4.5" fill="#34D399"/>
  <circle class="liveDot" cx="50" cy="49" r="4.5" fill="#34D399"/>
  <text x="64" y="53" fill="#34D399" font-weight="bold">SKILLS ONLINE</text>
  <text x="852" y="53" text-anchor="end" fill="#64748B">CLAUDE CODE<tspan fill="#475569">  //  </tspan>PLUGIN MARKETPLACE</text>
</g>

<!-- wordmark + sheen -->
<text x="450" y="158" text-anchor="middle" class="wmark" fill="url(#wm)" filter="url(#glow)" opacity=".42">alon-skills</text>
<text x="450" y="158" text-anchor="middle" class="wmark" fill="url(#wm)">alon-skills</text>
<g clip-path="url(#nameClip)"><rect class="sheen" x="210" y="84" width="140" height="92" fill="url(#sheen)"/></g>

<!-- animated underline -->
<rect x="320" y="178" width="260" height="2.5" rx="1.25" fill="url(#rule)"/>
<g clip-path="url(#ul)"><rect class="ulSheen" x="320" y="176" width="80" height="6" fill="#fff" opacity=".7"/></g>

<!-- subtitle + command list -->
<g text-anchor="middle">
  <text x="450" y="208" class="mono" font-size="13" letter-spacing="4" fill="#9FB3D1">SIX CLAUDE CODE SKILLS · ONE INSTALL</text>
  <text x="450" y="234" class="mono" font-size="11.5" fill="#5EEAD4">&gt; <tspan fill="#7FE9D8">/architect</tspan> · <tspan fill="#7DD3FC">/review-swarm</tspan> · <tspan fill="#A5B4FC">/ask-the-council</tspan> · <tspan fill="#C4B5FD">/prompt-generator</tspan> · <tspan fill="#F0ABFC">/up-to-date</tspan> · <tspan fill="#F9A8D4">/ponytail</tspan><tspan class="cur" fill="#E879F9">_</tspan></text>
</g>

<!-- telemetry row -->
<g class="mono" font-size="11" letter-spacing=".5" text-anchor="middle">
  <text x="170" y="270" fill="#64748B">BUILD · <tspan fill="#94A3B8">MODEL-FIRST</tspan></text>
  <text x="450" y="270" fill="#64748B">FAILURE-PATHS · <tspan fill="#94A3B8">BY DESIGN</tspan></text>
  <text x="730" y="270" fill="#64748B">LICENSE · <tspan fill="#94A3B8">MIT</tspan></text>
</g>
</svg>
